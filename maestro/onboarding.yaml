appId: com.anonymous.peelapp
---
- launchApp:
    clearState: true
- openLink: "com.anonymous.peelapp://expo-development-client/?url=http%3A%2F%2F192.168.1.75%3A8081"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Open in “Peel”?"
    commands:
      - tapOn:
          text: "Open"
          optional: true
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Open in \"Expo Go\"?"
    commands:
      - tapOn: "Open"
      - waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible:
    id: "get-started-button"
- takeScreenshot: "01-welcome"
- tapOn:
    id: "get-started-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible:
    id: "goal-seed_oils"
- takeScreenshot: "02-goals"
- tapOn:
    id: "goal-seed_oils"
- tapOn:
    id: "goal-general_health"
- takeScreenshot: "03-goals-selected"
- tapOn:
    id: "goals-continue-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible:
    id: "allergy-gluten"
- takeScreenshot: "04-allergies"
- tapOn:
    id: "allergy-gluten"
- tapOn:
    id: "allergy-dairy"
- takeScreenshot: "05-allergies-selected"
- tapOn:
    id: "allergies-continue-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "start-scanning-button"
    timeout: 15000
- takeScreenshot: "06-demo-story-1"
- tapOn:
    id: "start-scanning-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: "07-demo-story-2"
- tapOn:
    id: "start-scanning-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: "08-demo-story-3"
- tapOn:
    id: "start-scanning-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: "09-demo-story-4"
- tapOn:
    id: "start-scanning-button"
- waitForAnimationToEnd
- waitForAnimationToEnd
- assertVisible:
    id: "subscribe-button"
- takeScreenshot: "10-paywall-after-onboarding"
