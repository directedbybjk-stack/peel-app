appId: com.anonymous.peelapp
---
- launchApp
- waitForAnimationToEnd
- assertVisible: "Peel"
- runFlow:
    when:
      visible:
        id: "get-started-button"
    commands:
      - takeScreenshot: "app-launched-onboarding"
- runFlow:
    when:
      visible: "Scan a Product"
    commands:
      - takeScreenshot: "app-launched-home"
